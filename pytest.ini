# RNV Color Mixer — Pytest configuration
# ────────────────────────────────────────────────────────────────────────────
# LOCKED LAYOUT (do not change without updating phase plan):
#   • Root:    test_rnv_color_mixer.py  ← LOCKED, never modified
#   • /tests/: all NEW test files added in Phases 1-6 live here
# ────────────────────────────────────────────────────────────────────────────
# Used from Phase 1 onwards. Phase 0 still runs the existing unittest suite
# via `coverage run -m unittest test_rnv_color_mixer.py` for an apples-to-apples baseline.

[pytest]
# PyQt6 is the Qt binding for this project
qt_api = pyqt6

# Test discovery — both root (existing locked file) and /tests/ (new files)
testpaths = . tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers (registered to silence "unknown marker" warnings as we add them in later phases)
markers =
    slow: tests that take longer than 1 second
    threading: tests that exercise real QThread workers (Phase 3)
    integration: app-level tests instantiating ColorPickerApp (Phase 4)
    snapshot: format snapshot tests (Phase 2)
    property: hypothesis property-based tests (Phase 5)

# Don't recurse into these directories
norecursedirs = htmlcov build dist .venv venv __pycache__ .git snapshots .hypothesis
